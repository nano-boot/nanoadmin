<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAPI 文档</title>
  <script>
    // 根据当前 URL 动态设置 base,让相对路径 CSS/JS 总能命中本地静态资源路由
    (function () {
      var path = window.location.pathname.replace(/\/+$/, '');
      var base = document.createElement('base');
      base.href = path + '/assets/';
      document.head.appendChild(base);
    })();
  </script>
  <link rel="stylesheet" href="./swagger-ui.css" />
  <style>
    .auth-btn {
      background: #409eff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }
    .auth-btn:hover {
      background: #66b1ff;
    }
    .auth-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .auth-modal.show {
      display: flex;
    }
    .auth-modal-content {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
    }
    .auth-modal-content h3 {
      margin-top: 0;
    }
    .auth-modal-content input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .auth-modal-content .btn-group {
      text-align: right;
      margin-top: 16px;
    }
    .auth-modal-content .btn-group button {
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-modal-content .btn-group .cancel-btn {
      background: #f5f5f5;
      border: 1px solid #ddd;
      margin-right: 8px;
    }
    .auth-modal-content .btn-group .confirm-btn {
      background: #409eff;
      color: white;
      border: none;
    }
    .top-bar {
      background: #f5f7fa;
      padding: 10px 20px;
      border-bottom: 1px solid #e4e7ed;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="auth-btn" onclick="showAuthModal()">设置 Token</button>
  </div>
  <div id="swagger-ui"></div>
  
  <div id="authModal" class="auth-modal">
    <div class="auth-modal-content">
      <h3>设置 Authorization Token</h3>
      <p style="color: #666; font-size: 14px;">输入 Bearer Token 用于接口测试</p>
      <input type="text" id="tokenInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
      <div class="btn-group">
        <button class="cancel-btn" onclick="hideAuthModal()">取消</button>
        <button class="confirm-btn" onclick="applyToken()">确定</button>
      </div>
    </div>
  </div>
  
  <script src="./swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: window.location.pathname.replace(/\/?$/, '/') + 'doc',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: 'BaseLayout',
        docExpansion: 'none',
        defaultModelsExpandDepth: -1,
        requestInterceptor: function(request) {
          var token = localStorage.getItem('swagger_auth_token');
          if (token) {
            request.headers['Authorization'] = token;
          }
          return request;
        },
      });
    };
    
    function showAuthModal() {
      document.getElementById('authModal').classList.add('show');
      var savedToken = localStorage.getItem('swagger_auth_token') || '';
      document.getElementById('tokenInput').value = savedToken;
    }
    
    function hideAuthModal() {
      document.getElementById('authModal').classList.remove('show');
    }
    
    function applyToken() {
      var token = document.getElementById('tokenInput').value.trim();
      if (token) {
        if (!token.startsWith('Bearer ') && !token.startsWith('bearer ')) {
          token = 'Bearer ' + token;
        }
        localStorage.setItem('swagger_auth_token', token);
      } else {
        localStorage.removeItem('swagger_auth_token');
      }
      hideAuthModal();
      location.reload();
    }
  </script>
</body>
</html>
