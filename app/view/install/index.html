                <div class="dialog-title" id="dialogTitle">提示</div>
                <button type="button" class="dialog-close" id="dialogClose" aria-label="关闭">
                    <svg class="ic" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="dialog-body" id="dialogBody"></div>
            <div class="dialog-footer">
                <button type="button" class="btn btn-primary" id="dialogConfirm">确定</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const dialogMask = document.getElementById('dialogMask');
        const dialogEl = document.getElementById('dialog');
        const dialogTitleEl = document.getElementById('dialogTitle');
        const dialogIconEl = document.getElementById('dialogIcon');
        const dialogBodyEl = document.getElementById('dialogBody');
        const dialogCloseBtn = document.getElementById('dialogClose');
        const dialogConfirmBtn = document.getElementById('dialogConfirm');
                // Inline Lucide SVG icon library — mirrors the FA icons used by the page
        const ICONS = {
            database: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></g></svg>',
            cogs: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></g></svg>',
            check: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 6L9 17l-5-5"/></svg>',
            'check-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12l2 2l4-4"/></g></svg>',
            'tachometer-alt': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m12 14l4-4M3.34 19a10 10 0 1 1 17.32 0"/></svg>',
            php: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m18 16l4-4l-4-4M6 8l-4 4l4 4m8.5-12l-5 16"/></svg>',
            'puzzle-piece': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.39 4.39a1 1 0 0 0 1.68-.474a2.5 2.5 0 1 1 3.014 3.015a1 1 0 0 0-.474 1.68l1.683 1.682a2.414 2.414 0 0 1 0 3.414L19.61 15.39a1 1 0 0 1-1.68-.474a2.5 2.5 0 1 0-3.014 3.015a1 1 0 0 1 .474 1.68l-1.683 1.682a2.414 2.414 0 0 1-3.414 0L8.61 19.61a1 1 0 0 0-1.68.474a2.5 2.5 0 1 1-3.014-3.015a1 1 0 0 0 .474-1.68l-1.683-1.682a2.414 2.414 0 0 1 0-3.414L4.39 8.61a1 1 0 0 1 1.68.474a2.5 2.5 0 1 0 3.014-3.015a1 1 0 0 1-.474-1.68l1.683-1.682a2.414 2.414 0 0 1 3.414 0z"/></svg>',
            plug: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22v-5m3-9V2m2 6a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1zM9 8V2"/></svg>',
            'arrow-right': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7l7 7l-7 7"/></svg>',
            'info-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></g></svg>',
            times: '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>',
            'solid-error': '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M12 14a1 1 0 0 0 1-1V7a1 1 0 0 0-2 0v6a1 1 0 0 0 1 1m0 4a1.25 1.25 0 1 0-1.25-1.25A1.25 1.25 0 0 0 12 18" /></svg>',
            'times-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9l-6 6m0-6l6 6"/></g></svg>',
            spinner: '<svg class="ic ic-spin" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
        };

        function iconHTML(key) { return ICONS[key] || ''; }
let lastFocus = null;

        function notify(type, msg) {
            lastFocus = document.activeElement;
            dialogEl.className = 'dialog ' + type;
            dialogTitleEl.textContent = type === 'error' ? '错误' : '成功';
            dialogIconEl.innerHTML = type === 'success' ? iconHTML('check') : iconHTML('solid-error');
            dialogBodyEl.textContent = msg;
            dialogMask.classList.add('show');
            setTimeout(() => dialogConfirmBtn.focus(), 50);
        }

        function closeDialog() {
            dialogMask.classList.remove('show');
            if (lastFocus && typeof lastFocus.focus === 'function') lastFocus.focus();
        }

        dialogCloseBtn.addEventListener('click', closeDialog);
        dialogConfirmBtn.addEventListener('click', closeDialog);
        dialogMask.addEventListener('click', (e) => { if (e.target === dialogMask) closeDialog(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && dialogMask.classList.contains('show')) closeDialog();
        });

        function setStep(step) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.step-item').forEach(el => {
                el.classList.remove('active', 'completed');
            });
            const target = document.getElementById('step' + step);
            if (target) target.classList.add('active');
            document.querySelector('.step-item[data-step="' + step + '"]').classList.add('active');
            for (let i = 1; i < step; i++) {
                document.querySelector('.step-item[data-step="' + i + '"]').classList.add('completed');
            }
            document.getElementById('progressBar').style.width = (step / 3 * 100) + '%';
        }

        function appendLog(msg, type) {
            const log = document.getElementById('installLog');
            const item = document.createElement('div');
            item.className = 'log-item ' + (type || '');
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                           now.getMinutes().toString().padStart(2, '0') + ':' +
                           now.getSeconds().toString().padStart(2, '0');
            const iconKey = type === 'success' ? 'check-circle' : (type === 'error' ? 'times-circle' : 'info-circle');
            item.innerHTML = '<div class="icon">' + iconHTML(iconKey) + '</div>' +
                            '<span>' + msg + '</span>' +
                            '<span class="log-time">' + timeStr + '</span>';
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
        }

        // 测试数据库连接
        const testDbBtn = document.getElementById('testDbBtn');
        if (testDbBtn) {
            testDbBtn.addEventListener('click', async function() {
                const form = document.getElementById('installForm');
                const fd = new FormData(form);
                const data = {};
                for (const [k, v] of fd.entries()) data[k] = v;
                testDbBtn.disabled = true;
                testDbBtn.innerHTML = iconHTML('spinner') + ' 测试中...';
                try {
                    const res = await fetch('/install/test-db', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data),
                    });
                    const json = await res.json();
                    if (json.code === 20000) {
                        notify('success', json.message);
                    } else {
                        notify('error', json.message);
                    }
                } catch (err) {
                    notify('error', '请求失败: ' + err.message);
                } finally {
                    testDbBtn.disabled = false;
                    testDbBtn.innerHTML = iconHTML('plug') + ' 测试连接';
                }
            });
        }

        // 提交安装
        const form = document.getElementById('installForm');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // 校验密码
                if (form.admin_password.value !== form.admin_password_confirm.value) {
                    notify('error', '两次输入的密码不一致');
                    return;
                }
                if (form.admin_password.value.length < 6) {
                    notify('error', '管理员密码长度不能少于 6 位');
                    return;
                }

                setStep(2);
                appendLog('正在收集配置参数...');
                const fd = new FormData(form);
                const data = {};
                for (const [k, v] of fd.entries()) data[k] = v;

                appendLog('正在测试数据库连接...');
                try {
                    const res = await fetch('/install/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data),
                    });
                    const json = await res.json();

                    if (json.code === 20000) {
                        appendLog('✓ 数据库连接成功', 'success');
                        appendLog('✓ .env 文件已写入', 'success');
                        appendLog('✓ 数据库表已创建', 'success');
                        appendLog('✓ 初始数据已导入', 'success');
                        appendLog('✓ 初始管理员已创建', 'success');
                        appendLog('✓ install.lock 已生成', 'success');

                        setStep(3);
                        if (json.data && json.data.admin) {
                            document.getElementById('adminUsername').textContent = json.data.admin.username;
                        }
                    } else {
                        appendLog('✗ ' + json.message, 'error');
                        notify('error', json.message);
                        setStep(1);
                    }
                } catch (err) {
                    appendLog('✗ 请求失败: ' + err.message, 'error');
                    notify('error', '请求失败: ' + err.message);
                    setStep(1);
                }
            });
        }
    })();
    </script>
</body>
